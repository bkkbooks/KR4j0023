front:
  text: 虛齋樂府上
  hash: sha256:c2ac247e70378265b879bc0a297483242deae051bf456396014a25aa291a58fc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0023_SBCK_000-1a}
body:
  text: 萬年歡慶元聖節鳯曆開新正微和乍轉麗景初曉五莢􅕴舒光映玉階瑶草在在東風語笑慶此日虹流電繞鯨波靜翠湧鼇山嵩呼聲動雲表絳節霓旌縹眇望珠星燦爛紫微深窈琬液香浮露濕蟠桃猶小疊疊仙韶九奏知春到人間多少蓬萊外若木扶踈萬年枝上長好大酺牡丹正緑隂濃鶯聲懶庭院寒輕煙薄天然花富貴逞夭紅殷紫疊葩重蕚醉艷酣春妍姿浥露翠羽輕明如削檀心鴉黃嫩似離情愁緒萬絲交錯更銀燭相輝玉瓶微浸宛然京洛朝來風雨惡怕僝僽低張青油幕便好倩佳人插帽貴客傳箋趂良辰賞心行樂四美難并也須拚醉莫辭杯酌被花惱情無著長笛何處一笑江頭髙閣極目水雲漠漠孤鸞梅江南春早問江上寒梅占春多少自照踈星冷秪許春風到幽香不知甚處但迢迢滿汀煙草回首誰家竹外有一枝斜好記當年曽共花前笑念玉雪襟期有誰知道喚起羅浮夢正參橫月小凄涼更吹塞管謾相思鬢華驚老待覔西湖半曲對霜天清曉金盞子水仙得水能仙向漢臯遺珮碧波涵月藍玉暖生煙稱縞袂黃冠素姿芳潔亭亭獨立風前照氷壷澄徹當時事琴心妙處誰傳頓成愁絶六出自天然更一味清香渾勝雪西湖秋菊寒泉似坡老風流至今人説殷勤折伴梅邊聽玉龍吹裂丁寧道百年兄弟相看晚節天香牡丹蜀錦移芳巫雲散彩天孫剪取相寄金屋看承玉臺凝盻尚憶舊家風味生香絶艷説不盡天然富貴臉嫩渾疑看損肌柔只愁吹起花神為誰著意把韶華揔歸姝麗可是老來心事不成春思却羡宫𫀆仙子調曲曲清平似翻水笑囑東風殷勤勸醉探春慢立春南國收寒東郊放暖條風初回臺榭小燕橫叉閙娥低鬢根底吳娃夭冶纎手傳生菜向人道新春來也莫須沉醉樽前這些風景無價長記年年此日迎著箇牛兒綵鞭羞打颭颭金幡星星華髮得似家山間暇都把心期事待問訊柳邊花下簫鼓聲中溫存小樓深夜探春慢四明除夜屑璐飄寒鏤金獻巧粧成水晶亭榭飛絮悠揚散花零亂絶勝翠嬌紅冶粉艷嘻嘻道盡飛上史君鬚也多情莫笑衰翁舊時梁苑聲價窗外小梅羞澀倩羯鼓樽前慢𫾣輕打鯨海停波鶴譙賔月贏得殘年清暇心事知誰會但夢繞越王城下白玉青絲且同醉吟春夜探春慢四明次黃玉泉寶勝賔春華燈照夜窮冬渾然如客爐熖麟紅杯深翡翠早減三分寒力一笑團欒處恰喜得雪消風息苔枝數蘂明珠恍疑香麝初拆懊恨東君無凖甚朝做重隂暮還晴色喚燕呼鶯雕花鏤葉機巧可曽休得靜裏無窮意謾看盡紛紛紅白且聽新腔紅牙玉纖低拍龍山會南豐登髙重整登髙屐群玉峯頭萬里秋無極逺山青欲滴新鴈過縹眇孤雲天北煙入小橋低水痕退寒流澄碧對佳辰驚心客裏鬢絲堪摘風流晉宋諸賢騎臺龍山俯仰皆陳迹慿欄看落日嗟往事惟有黃花如昔醉袖舞西風任教笑參差鳬舄但回首東籬久負有誰知得龍山會去年九日登南澗無盡閣野涉賦詩僕與東溪藥窗諸友皆和今年陪元戎遊升山詰朝始克修故事則向之龍蛇滿壁者易以山水矣拍欄一笑遊兄幾叟分韻得苦字為歌商調龍山會九日無風雨一笑憑髙浩氣橫秋宇羣峯青可數寒城小一水縈回如縷西北最關情謾遙指東徐南楚黯銷魂斜陽冉冉鴈聲悲苦今朝黃菊依然重上南樓草草成歡聚詩朋休浪賦舊題處俯仰已隨塵土莫放酒行踈清漏短涼蟾當午也全勝白衣未至獨醒凝佇龍山會四明重陽泛舟月湖佳節明朝九綵舫凌虛共醉西風酒湖光藍滴透雲浪碎巧學波紋吹皺碧落香無邊但玉削千峯寒瘦留連久秋容似洗月華如晝回頭南楚東徐暝靄蒼煙處處空刁斗山公今健否功名事付與年時交舊白髮苦欺人尚堪插黃花盈首歸去也東籬好在覔淵明友芙蓉月黃葉舞碧空臨水處照眼紅苞齊吐柔情媚態佇立西風如訴遙想仙家城闕十萬緑衣童女雲縹眇玉娉婷隱隱彩鸞飛舞樽前更風度記天香國色曽占春暮依然好在還伴清霜涼露一曲欄干𫾣遍悄無語空相顧殘月淡酒闌時滿城鐘鼓夜飛鵲七夕和方時父韻微雲拂斜月萬籟聲沉涼露暗墜桐隂蛾眉乞得天孫巧愔愔樓上穿針佳期鵲相誤到年時此夕歡淺愁深人間兒女説風流直到如今河漢幾曽風浪因景物牽情自是人心長記秋庭往事鈿花剪翠叉股分金道人無著正蕭然竹枕練衾夢回時天淡星稀間弄一曲瑶琴秋蘂香木犀一夜金風吹成萬粟枝頭點點明黃扶踈月殿影雅淡道家裝阿誰倩天女散濃香十分熏透霓裳徘徊處玉繩低轉人靜天涼底事小山幽詠渾未識清妍空自情傷憶佳人執手訴離湘招蟾魄和酒吸秋光碧雲日暮何妨惆悵久瑶琴微弄一曲清商角招薑白石製角招徵招二曲僕賦梅花以角招歌之蓋古樂府有大小梅花皆角聲也曉寒薄苔枝上剪成萬點冰蕚暗香無處著立馬斷魂晴雪籬落橫溪略彴恨寄驛音書遼邈夢繞揚州東閣風流舊日何郎想依然林壑離索引杯自酌相看冷淡一笑人如削水雲寒漠漠底處群仙飛來霜鶴芳姿綽約正月滿瑶臺珠箔徙倚欄干寂寞盡分付許多愁城頭角徵招雪玉壺凍裂琅玕折駸駸逼人衣袂暖絮張空飛失前山橫翠欲低還又起似粧點滿園春意記憶當時剡中情味一溪雲水天際絶行人髙吟處依俙灞橋鄰里更剪剪梅花落雲階月地化工真解事強勾引老來詩思楚天暮驛使不來悵曲欄獨倚揚州慢瓊花惟揚州后土殿前一本比聚八仙大率相類而不同者有三瓊花大而瓣厚其色淡黃聚八仙花小而瓣薄其色微青不同者一也瓊花葉柔而瑩澤聚八仙葉粗而有芒不同者二也瓊花蘂與花平不結子而香聚八仙蘂低於花結子而不香不同者三也友人折贈數枝云移根自鄱陽之洪氏感而賦之其調曰揚州慢十里春風二分明月蘂仙飛下瓊樓看冰花剪剪擁碎玉成毬想長日雲階佇立太真肌骨飛燕風流斂羣芳清麗精神都付揚州雨窗數朵夢驚回天際香浮似閬苑花神憐人冷落騎鶴來遊為問竹西風景長空淡煙水悠悠又黃昏羌管孤城吹起新愁揚州慢諸賢詠賞瓊花之次日復得牡丹數枝方兹溪又以詞來索和遂併為二花著語梁苑吟新髙陽飲散玉容寂寞粧樓故人應念我折贈水晶毬不須倩東風説與吹簫雲路解珮江流似天涯邂逅相逢低問東州為花更醉細挼香酒靣酥浮記橋月同看簾風共笑仙枕曽遊無奈乍晴還雨江天暮飛絮悠悠莫先教偷取春歸滿地清愁惜黃花菊衆芳凋謝堪愛處老圃寒花幽野照眼如畫爛然滿地金錢買斷金天無價古香逸韻似髙人更野服黃冠瀟麗向霜夜冷笑暖春桃李夭冶襟期問與誰同記往昔獨自徘徊籬下采采盈把此時一假風流賴得白衣陶寫而今為米負初心且細摘輕浮三雅沉醉也夢落故園茅舍憶舊遊慢荷花泛東湖用方時父韻愛東湖六月十里香風翡翠鋪平誤入紅雲裏似當年太乙約我尋盟葉舟蕩漾寒碧分得一襟冰漸際晚輕隂修蒲舞緑倦栁蘇青娉婷黯無語想怨女三千長自宫庭六六欄干曲有玉兒才貌誰與看承柔情一點無奈頻付酒杯行到夜靜人歸涼蟾自照鷗鷺汀憶舊遊慢望紅蕖影裏冉冉斜陽十里隄平喚起江湖夢向沙鷗住處細説前盟水鄉六月無暑寒玉散清冰笑老夫心情也將醉眼鎮為花青亭亭步明鏡似月浸華清人在秋庭照夜銀河落想粉香濕露恩澤初承十洲縹眇何許風引綵舟行尚憶得西施餘情裊裊煙水汀解語花東湖賦蓮後五日雙苞呈瑞昌化史君持以見遺因用時父韻紅香濕月翠影停雲羅襪塵生步並肩私語知何事暗遣玉容泣露間情最苦任笑道爭妍似妬倒銀河秋夜雙星不到佳期誤擬把江妃共賦憶當時携手煙水深處明珠濺雨凝脂滑洗出一番鉛素慿誰説與莫便化綵鸞飛去待玉童雙節來迎為作芙蓉主燭影搖紅乍冷還暄小春時候今朝轉三分曆日二分休鏡裏清霜滿雲幕低垂不展矮窗明紅麟初暖老來活計濁酒三杯黃庭一卷萬里關河朔風吹到邉聲逺倚樓脈脈數歸鴻誰會愁深淺最苦山寒日短但梅花相看歲晚何人金屋巧囀歌鶯慢調筝鴈薄媚摘遍重九登九仙山和張屴崱桂香銷梧影瘦黃菊迷深院倚西風看落日長江東去如練先生底事有賦飄然剛道為田園燭醒何為持杯自勸未能免休把茱茰吟玩但管年年健千古事幾慿欄吾生早九十強半歡娛終日冨貴何時一笑醉鄉寬倒載歸來回廊月滿沁園春客問吾年吾將老矣今五十三似北海先生過之又過善財童子參到無參官路太行世情滄海何止嵇康七不堪歸來也是休官令尹有髮瞿曇千巖秀色如藍新著箇樓兒恰對南看浮雲自在百般態度長江無際一碧虛涵荔子江珧蓴羮鱸鱠一曲春風酒半酣慿欄處正空流皓月光滿寒潭沁園春次方時父自笑生來骨相無竒壬三甲三覺紫宸班裏都忘故步維摩室內添箇新參壯也不如老之將至今日將軍戰豈堪江湖客况詩肥賈島筆瘦王曇紛紛紆紫拖藍送水北山人又水南喜支離得佚散材可壽一丘自足萬象中涵膾炙功名膏肓富貴舉丗黃梁夢正酣知誰健且茹芝商嶺飲菊胡潭賀新郎四明送上官尉歸吳滿酌蓬萊酒最苦是中年作惡送人時候一夜朔風吹石裂驚得梅花也瘦更衣袂嚴霜寒透卷起潮頭無丈尺甚扁舟拍上三江口明月冷載歸否分携欲折無垂栁但層樓倚徙兩眉空皺海闊天髙無處問萬事不堪回首况目斷孤鴻去後玉樣松鱸今正美想子真微笑還招手且為我飲三斗賀新郎次劉後村葵扇秋來賤阿誰知初回轉暑又教題遍不是琵琶知音少無限如簧巧囀倩説似長門休怨莫把蛾眉與人妬但踈梅淡月深深院臨寶鑑欲粧懶少時聲價傾梁苑到中年也曽落魄霧收雲卷待入漢庭金馬去灑筆長江衮衮好留取才名久逺過眼榮華俱塵土聽關雎盈耳離騷婉歌不足為嗟嘆賀新郎送鄭怡山歸里載酒陽關去正西湖連天煙草滿堤晴絮采翠擷芳遊冶處譍和嬌絃艷鼓看栁外畫船無數萬頃琉璃渾鏡淨陡風波洶洶魚龍舞談笑裏遽如許流觴滿引澆離緒便東西斜陽立馬緑波前浦自是蓴鱸髙興動恰值春山杜宇謾回首軟紅香霧咫尺佳人千里隔望空江明月橫洲渚清夢斷恨如縷賀新郎芝山堂下蘭開雙花瓣外環兩心中並有同人之義焉瑞蓮嘉禾歌頌多矣此獨創見小詞紀之草色庭前緑掩重門國香伴我晝簾幽獨無奈薰風吹緑綺間理離騷舊曲覺鼻觀微聞清馥可是花相嫌冷淡碧叢中炯炯駢雙玉相對久各歡足冰姿帶露如新沐想當年夷齊二子獨清孤竹千古英雄塵土盡凛凛西山雲木揔付與一樽醽醁學得漢官嬌姊妹便承恩貯向黃金屋終不似在空谷賀新郎夜來月色可人蘭香滿室再用前調碾破長空緑看銀蟾一輪似水照人清獨縹眇風搖環珮碎疑是英莖妙曲忽散作天花芬馥帝子雙雙來洞户炯肌膚冰雪顔如玉愁易老意難足楚江萬頃疏湯沐想佳人依然携手碧雲修竹蔥蒨玲瓏方寸許清過千重夏木速就我同傾湘醁追憶蘭亭當日事儘凄涼也勝盧同屋應不到羡金谷賀新郎次孫花翁乙酉春事渾如客趂新晴花驄驕俊紵衫輕窄臘甕初傾光欲動笑把黃甘旋擘更喜得酒朋詩敵陶寫襟懷觴詠裏似風流王謝當年集忘爾汝任爭席踈簾畫舫梅粧白看斜陽波心鏡靣照伊顔色縹眇笙歌天上譜一刻千金莫惜誰信道髙樓占得栁外暝煙人去也但月鈎冷浸欄竿濕知過了幾寒食漢宫春次方時父元夕見寄投老歸來記踏青隄上三度逢君寒窗冷淡活計明月空樽紅紅白白又一畨春色撩人誰信道間中天地園林幾見成塵今夕偶無風雨便滿城簫鼓來往紛紛鼇山寶燈照夜羅綺千門珠簾盡捲看娉婷水上行雲應自笑周郎年日風流羽扇綸巾虛齋樂府上唐以詩鳴者千餘家詞自花間集外不多見而慢詞尤不多載朝太平盛時栁耆卿周美成羡為新譜諸家又增益之腔調備矣後之倚其聲者語工則音未必諧音諧則語未必工斯其難也余平時不敢強輯友朋間相勉屬和隨輒棄去奚子偶于故書中淂斷藳又于黃玉泉處傳録數十闋共為一編余笑曰文章小技耳况長短句哉今老矣不能為也因書其後以志吾過淳祐已酉中秋芝山老人虛齋樂府目録上萬年歡大酺孤鸞金盞子天香探春慢三龍山會三芙蓉月夜飛鵲秋蘂香角招徵招揚州慢二惜黃花憶舊慢三燭影搖紅薄媚摘遍沁園春三賀新郎六虛齋樂府目録下暗香踈影尾犯燕春臺二玉燭新
